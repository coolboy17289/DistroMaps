# DistroMap — Production Docker Compose
# Server 1 (Main): frontend, backend-api, postgres, redis
# Server 2 (Workers): python-scrapers, ai-processor
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d postgres redis     # Start only databases
#   docker compose logs -f backend-api      # Follow API logs
#   docker compose exec postgres psql -U distromap -d distromap  # DB shell

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: distromap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distromap
      POSTGRES_USER: ${POSTGRES_USER:-distromap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend-api/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-distromap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: distromap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend API (Node.js / Express) ────────────────────────────────
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: distromap-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-distromap}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/distromap
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (Vue 3 + Three.js, served by Nginx) ──────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend-vue/Dockerfile
    container_name: distromap-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend-api

  # ─── Python Scrapers (Server 2) ────────────────────────────────────
  python-scrapers:
    build:
      context: ./backend-data
      dockerfile: Dockerfile
    container_name: distromap-scrapers
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-distromap}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/distromap
      REDIS_URL: redis://redis:6379
      API_INTERNAL_URL: http://backend-api:3001/api/internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - workers

  # ─── AI Processor (Server 2) ───────────────────────────────────────
  ai-processor:
    build:
      context: ./backend-data
      dockerfile: Dockerfile
    container_name: distromap-ai
    restart: unless-stopped
    command: python -m workers.ai_processor
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-distromap}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/distromap
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - workers

volumes:
  pgdata:
  redisdata:
